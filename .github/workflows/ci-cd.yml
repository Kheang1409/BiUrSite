name: CI/CD Pipeline

on:
  push:
    branches:
      - test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "9.0"

      - name: List backend directory contents
        run: |
          ls -la ./backend

      - name: Restore dependencies
        run: |
          dotnet restore ./backend/API/Api.csproj

      - name: Build backend
        run: |
          dotnet build ./backend/API/Api.csproj --configuration Release --no-restore

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: Set version
        id: version
        run: echo "VERSION=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker images
        run: |
          # Build and tag backend
          # Ensure the repository root is used as the build context so files like backend.sln
          # (which live at ./backend/backend.sln) are available to the Dockerfile.
          # Use -f to point to the Dockerfile inside the backend folder.
          echo "Listing repo root for debugging" && ls -la .
          echo "Listing backend folder for debugging" && ls -la ./backend
          # Use ./backend as the build context so the Dockerfile's COPY paths (like API/Api.csproj)
          # which are relative to the backend folder resolve correctly.
          docker build -f backend/Dockerfile -t ${{ secrets.DOCKER_HUB_USERNAME }}/biursite-backend:latest \
                       -t ${{ secrets.DOCKER_HUB_USERNAME }}/biursite-backend:v${{ steps.version.outputs.VERSION }} \
                       ./backend

          # Build and tag frontend
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/biursite-frontend:latest \
                       -t ${{ secrets.DOCKER_HUB_USERNAME }}/biursite-frontend:v${{ steps.version.outputs.VERSION }} \
                       ./frontend

          # Push backend images
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/biursite-backend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/biursite-backend:v${{ steps.version.outputs.VERSION }}

          # Push frontend images
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/biursite-frontend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/biursite-frontend:v${{ steps.version.outputs.VERSION }}
