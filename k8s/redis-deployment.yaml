apiVersion: apps/v1
kind: Deployment
metadata:
  name: biursite-redis
  labels:
    app: biursite-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biursite-redis
  template:
    metadata:
      labels:
        app: biursite-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
              name: redis
