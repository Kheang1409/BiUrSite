apiVersion: apps/v1
kind: Deployment
metadata:
  name: biursite-backend
  labels:
    app: biursite-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: biursite-backend
  template:
    metadata:
      labels:
        app: biursite-backend
    spec:
      containers:
        - name: biursite-backend
          # Image set to your Docker Hub username
          image: kai1409/biursite-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            # Secrets should be created using the provided PowerShell script or kubectl directly.
            - secretRef:
                name: biursite-secrets
          env:
            # Redis service is deployed in the same namespace and is reachable via DNS "biursite-redis"
            - name: REDIS_CONNECTION_STRING
              value: "biursite-redis:6379"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
