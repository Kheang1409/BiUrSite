<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="192" height="192" rx="45" fill="#0A1628"/>
  
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0682A5" />
      <stop offset="100%" stopColor="#45B0D1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="96" cy="96" r="92" fill="none" stroke="#0682A5" strokeWidth="2" opacity="0.2"/>
  
  <!-- Central nodes representing network/social connection -->
  <!-- Top center node -->
  <circle cx="96" cy="40" r="12" fill="url(#faviconGradient)" />
  
  <!-- Left node -->
  <circle cx="56" cy="96" r="12" fill="url(#faviconGradient)" />
  
  <!-- Right node -->
  <circle cx="136" cy="96" r="12" fill="url(#faviconGradient)" />
  
  <!-- Bottom left node -->
  <circle cx="68" cy="148" r="12" fill="url(#faviconGradient)" />
  
  <!-- Bottom right node -->
  <circle cx="124" cy="148" r="12" fill="url(#faviconGradient)" />
  
  <!-- Center node - larger -->
  <circle cx="96" cy="104" r="16" fill="url(#faviconGradient)" />
  
  <!-- Connection lines -->
  <line x1="96" y1="50" x2="96" y2="88" stroke="url(#faviconGradient)" strokeWidth="6" opacity="0.5" strokeLinecap="round"/>
  <line x1="88" y1="96" x2="56" y2="96" stroke="url(#faviconGradient)" strokeWidth="6" opacity="0.5" strokeLinecap="round"/>
  <line x1="104" y1="96" x2="136" y2="96" stroke="url(#faviconGradient)" strokeWidth="6" opacity="0.5" strokeLinecap="round"/>
  <line x1="96" y1="120" x2="75" y2="136" stroke="url(#faviconGradient)" strokeWidth="6" opacity="0.5" strokeLinecap="round"/>
  <line x1="96" y1="120" x2="117" y2="136" stroke="url(#faviconGradient)" strokeWidth="6" opacity="0.5" strokeLinecap="round"/>
  
  <!-- Decorative glow -->
  <circle cx="96" cy="104" r="16" fill="url(#faviconGradient)" opacity="0.1" r="24"/>
</svg>
