<div class="page">
  <h2 class="text-lg">People</h2>

  <div class="people-list">
    <div *ngFor="let user of users" class="person-card card">
      <div class="avatar-wrap">
        <img
          class="avatar"
          [src]="user.profile || '/assets/img/default-avatar.png'"
          alt="avatar"
        />
      </div>

      <div class="person-body">
        <div class="username">{{ user.username }}</div>
        <div class="meta text-xs" style="color: var(--muted)">
          Joined: {{ user.createdDate | date : "mediumDate" }}
        </div>
        <div class="bio text-sm" style="color: var(--muted)">
          {{ user.bio }}
        </div>
      </div>
    </div>

    <div #infiniteAnchor class="infinite-anchor"></div>

    <div *ngIf="isLoading" class="loading-indicator message">
      <span class="spinner"></span> Loading more people...
    </div>

    <div *ngIf="!hasMore && !isError" class="no-more-posts message">
      No more people to load.
    </div>

    <div *ngIf="isError" class="error-message message">{{ errorMessage }}</div>
  </div>
</div>
