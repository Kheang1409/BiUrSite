<div class="profile-left">
  <!-- Avatar moved to parent `profile.component.html` so it can overlap the cover image.
       The native file input remains here so the child component can control the picker
       (openFilePicker will trigger this input). -->

  <input
    #fileInput
    class="file-input"
    type="file"
    accept="image/*"
    (change)="fileSelected.emit($event)"
  />

  <div class="user-meta">
    <h3 class="username">{{ user.username }}</h3>
    <p class="bio" *ngIf="user.bio && !editMode">{{ user.bio }}</p>
    <p class="muted small">
      Joined {{ user.createdDate | date : "mediumDate" }}
    </p>
  </div>

  <div class="profile-actions">
    <button class="btn-primary" (click)="toggleEdit.emit()">
      {{ editMode ? "Cancel" : "Edit Profile" }}
    </button>
  </div>
</div>
