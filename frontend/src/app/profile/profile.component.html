<div class="profile-container fb-style">
  <!-- Cover photo area -->
  <div class="cover-wrap">
    <!-- Reserve cover image dimensions to prevent layout shifts. Adjust sizes if different in design -->
    <img
      class="cover-image"
      [src]="user.profile"
      alt="Cover"
      width="1200"
      height="300"
      loading="lazy"
    />
  </div>

  <!-- Avatar placed here so it can overlap the cover image bottom-left -->
  <div
    class="avatar-stack"
    (click)="profileLeft?.openFilePicker()"
    title="Change profile image"
  >
    <div class="avatar-wrap">
      <img
        [src]="selectedImagePreview ? selectedImagePreview : user.profile"
        alt="Profile Image"
        class="profile-image"
      />
    </div>
  </div>

  <!-- Main content with overlapping avatar -->
  <div class="profile-main">
    <app-profile-left
      #profileLeft
      [user]="user"
      [editMode]="editMode"
      [selectedImagePreview]="selectedImagePreview"
      (fileSelected)="onFileSelected($event)"
      (toggleEdit)="toggleEdit()"
    ></app-profile-left>

    <!-- Center column: user's posts -->
    <app-profile-center
      [posts]="posts"
      [isLoading]="isLoading"
      (deletePost)="onDeletePost($event)"
      (loadMore)="loadMoreProfilePosts()"
    ></app-profile-center>

    <!-- Right column: notifications -->
    <app-profile-right [notifications]="notifications"></app-profile-right>
  </div>
  <app-profile-edit-modal
    *ngIf="editMode"
    [user]="user"
    (save)="onChildSave($event)"
    (cancel)="toggleEdit()"
  ></app-profile-edit-modal>
</div>
