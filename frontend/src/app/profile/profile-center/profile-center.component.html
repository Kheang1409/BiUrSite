<div class="profile-center">
  <div class="posts-header">
    <h3>Posts</h3>
  </div>

  <div class="profile-posts">
    <app-post
      *ngFor="let post of posts"
      [post]="post"
      (deletePost)="onDelete(post.id)"
    ></app-post>

    <div *ngIf="isLoading" class="loading-indicator message">
      <span class="spinner"></span> Loading posts...
    </div>

    <div *ngIf="!isLoading && posts.length === 0" class="no-posts message">
      No posts yet.
    </div>

    <div #infiniteAnchor style="min-height: 8px; width: 100%"></div>
  </div>
</div>
