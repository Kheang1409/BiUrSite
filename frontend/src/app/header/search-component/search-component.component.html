<!-- Desktop Search -->
<div class="search-bar desktop-only">
  <div class="search-input">
    <i class="fas fa-search" aria-hidden="true"></i>
    <input
      type="text"
      placeholder="Search"
      [(ngModel)]="searchKeyword"
      (keyup.enter)="onSearch()"
      aria-label="Search"
    />
  </div>
</div>

<!-- Mobile Search Toggle -->
<button
  class="icon-btn search-toggle mobile-only"
  (click)="toggleMobileSearch($event)"
  [attr.aria-expanded]="mobileSearchVisible"
  aria-haspopup="true"
  aria-label="Toggle search"
>
  <i class="fas fa-search" aria-hidden="true"></i>
</button>

<!-- Mobile Search Overlay -->
<div
  class="mobile-search"
  [class.show]="mobileSearchVisible"
  (click)="closeMobileSearch()"
>
  <div class="mobile-search-inner" (click)="$event.stopPropagation()">
    <input
      #mobileSearchInput
      type="text"
      placeholder="Search"
      [(ngModel)]="searchKeyword"
      (keyup.enter)="onSearch(); closeMobileSearch()"
      aria-label="Mobile search"
    />
    <button class="btn-cancel" (click)="closeMobileSearch()">Cancel</button>
  </div>
</div>
