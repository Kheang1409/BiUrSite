<div class="action-icons" *ngIf="isLoggedIn">
  <!-- Create Post -->
  <button
    class="icon-btn"
    aria-label="Create new post"
    (click)="openCreatePostModal()"
  >
    <i class="fas fa-plus"></i>
  </button>

  <!-- Notifications -->
  <div
    class="notification-icon"
    [class.has-new-notifications]="hasNewNotifications"
    (click)="toggleNotificationDropdown($event)"
    aria-haspopup="true"
    [attr.aria-expanded]="showNotificationDropdown"
    tabindex="0"
  >
    <i class="fas fa-bell"></i>

    <span class="red-dot" *ngIf="hasNewNotifications"></span>

    <div
      class="notification-dropdown"
      [class.show]="showNotificationDropdown"
      role="menu"
    >
      <div class="notification-header">
        <strong>Notifications</strong>
      </div>

      <ul class="notification-list">
        <li
          *ngFor="let notification of notifications"
          role="menuitem"
          (click)="openNotification(notification)"
          tabindex="0"
        >
          <img
            class="notif-avatar"
            [src]="notification.userProfile || '/assets/img/default-avatar.png'"
            alt="{{ notification.username }}'s avatar"
            loading="lazy"
          />

          <div class="notif-content">
            <div class="notif-title">
              <span class="username">{{ notification.username }}</span>
              <span class="action">{{ notification.title }}</span>
            </div>

            <div class="notif-message">{{ notification.message }}</div>

            <div class="notif-meta">
              <span class="time">{{ notification.createdDate | timeAgo }}</span>
            </div>
          </div>
        </li>
      </ul>

      <div *ngIf="isError" class="error" role="alert">
        {{ errorMessage }}
      </div>

      <div *ngIf="!isError && notifications.length === 0" class="empty">
        No new notifications
      </div>
    </div>
  </div>
</div>
