<div class="error-page">
  <div class="error-page-centered">
    <div class="error-face-icon">
      <!-- Funny face: wink, tongue out, playful details -->
      <svg
        width="140"
        height="140"
        viewBox="0 0 140 140"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <circle
          cx="70"
          cy="70"
          r="64"
          fill="#fff"
          stroke="#0682a5"
          stroke-width="5"
          style="stroke: var(--primary-1, #0682a5)"
        />
        <!-- Left eye (open) -->
        <ellipse
          cx="50"
          cy="68"
          rx="12"
          ry="14"
          fill="#223056"
          style="fill: var(--primary-2, #223056)"
        />
        <!-- Right eye (wink) -->
        <rect
          x="82"
          y="68"
          width="24"
          height="4"
          rx="2"
          fill="#223056"
          style="fill: var(--primary-2, #223056)"
        />
        <!-- Eyebrows -->
        <path
          d="M40 56 Q50 50 60 56"
          stroke="#0682a5"
          stroke-width="2"
          fill="none"
          style="stroke: var(--primary-1, #0682a5)"
        />
        <path
          d="M80 56 Q92 52 104 58"
          stroke="#0682a5"
          stroke-width="2"
          fill="none"
          style="stroke: var(--primary-1, #0682a5)"
        />
        <!-- Playful mouth -->
        <path
          d="M50 100 Q70 120 90 100 Q80 110 70 100 Q60 110 50 100"
          stroke="#0682a5"
          stroke-width="4"
          fill="#fff"
          style="stroke: var(--primary-1, #0682a5)"
        />
        <!-- Tongue -->
        <ellipse
          cx="70"
          cy="112"
          rx="10"
          ry="6"
          fill="#0682a5"
          style="fill: var(--primary-1, #0682a5)"
        />
        <path
          d="M70 112 Q72 118 74 112"
          stroke="#223056"
          stroke-width="2"
          style="stroke: var(--primary-2, #223056)"
        />
        <!-- Cheek blush -->
        <ellipse
          cx="38"
          cy="90"
          rx="6"
          ry="3"
          fill="#06b6d4"
          style="fill: var(--primary-1, #06b6d4)"
          opacity="0.5"
        />
        <ellipse
          cx="102"
          cy="90"
          rx="6"
          ry="3"
          fill="#06b6d4"
          style="fill: var(--primary-1, #06b6d4)"
          opacity="0.5"
        />
      </svg>
    </div>
    <h1 class="error-code-simple">{{ errorCode }}</h1>
    <p class="error-text-simple">{{ errorMessage }}</p>
    <a routerLink="/" class="home-link-simple">Return to Homepage</a>
  </div>
</div>
