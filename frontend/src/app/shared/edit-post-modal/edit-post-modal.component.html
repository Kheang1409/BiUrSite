<div class="edit-post-modal">
  <div class="modal-header">
    <h2>Edit Post</h2>
    <button (click)="closeModal()" aria-label="Close">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="modal-content">
    <div class="post">
      <div class="post-header">
        <img [src]="post.userProfile" alt="User Avatar" class="user-avatar" />
        <div class="user-info">
          <h3>{{ post.username }}</h3>
          <p>{{ post.createdDate | timeAgo }}</p>
        </div>
      </div>

      <div class="post-content">
        <textarea
          [(ngModel)]="updatePost.text"
          placeholder="Edit your post..."
        ></textarea>
      </div>
    </div>

    <div class="post-actions">
      <button class="btn-secondary" (click)="closeModal()">Cancel</button>
      <button class="btn-primary" (click)="savePost()" [disabled]="isSaving">
        {{ isSaving ? "Saving..." : "Save Changes" }}
      </button>
    </div>

    <div *ngIf="isError" class="error-message">
      {{ errorMessage }}
    </div>
  </div>
</div>
