<!-- Reusable third-party login buttons -->
<div class="third-party-login">
  <button
    class="btn btn-google"
    type="button"
    aria-label="Login with Google"
    (click)="loginWith3rdParty('Google')"
  >
    <span class="icon" aria-hidden="true">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M21.35 11.1h-9.2v2.8h5.3c-.22 1.4-1.4 4.1-5.3 4.1-3.2 0-5.8-2.6-5.8-5.8s2.6-5.8 5.8-5.8c1.8 0 3 0.76 3.7 1.42l2.5-2.42C17.3 3.7 15.1 2.6 12 2.6 6.5 2.6 2 7.1 2 12.6s4.5 10 10 10c5.8 0 9.6-4.1 9.6-9.9 0-.67-.07-1.18-.25-1.6z"
          fill="#ffffff"
        />
      </svg>
    </span>
    <span class="label">Continue with Google</span>
  </button>

  <button
    class="btn btn-facebook"
    type="button"
    aria-label="Login with Facebook"
    (click)="loginWith3rdParty('Facebook')"
  >
    <span class="icon" aria-hidden="true">
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M22 12.07C22 6.5 17.52 2 12 2S2 6.5 2 12.07C2 17.1 5.66 21.2 10.44 22v-7.03H8.08v-2.9h2.36V9.6c0-2.33 1.39-3.62 3.52-3.62 1.02 0 2.09.18 2.09.18v2.3h-1.17c-1.15 0-1.51.72-1.51 1.46v1.74h2.57l-.41 2.9h-2.16V22C18.34 21.2 22 17.1 22 12.07z"
          fill="#ffffff"
        />
      </svg>
    </span>
    <span class="label">Continue with Facebook</span>
  </button>
</div>
