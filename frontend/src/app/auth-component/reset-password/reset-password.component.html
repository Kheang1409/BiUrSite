<app-auth-form-wrapper>
  <form (ngSubmit)="resetPassword()">
    <h2>Reset Password</h2>
    <p>Please enter the OTP sent to your email and your new password.</p>

    <input
      type="text"
      placeholder="OTP"
      [(ngModel)]="resetData.otp"
      name="otp"
      required
    />
    <input
      type="password"
      placeholder="New Password"
      [(ngModel)]="resetData.newPassword"
      name="newPassword"
      required
    />
    <input
      type="password"
      placeholder="Confirm Password"
      [(ngModel)]="resetData.confirmPassword"
      name="confirmPassword"
      required
    />

    <div class="error-message" *ngIf="isPasswordMismatch">
      Passwords do not match.
    </div>
    <div class="error-message" *ngIf="isError">{{ errorMessage }}</div>

    <button type="submit">Reset Password</button>
    <a [routerLink]="login">Back to Login</a>
  </form>
</app-auth-form-wrapper>
