<app-auth-form-wrapper>
  <form (ngSubmit)="forgotPassword()">
    <h2>Forgot Password</h2>
    <p>
      Enter your email address below, and we’ll send you a link to reset your
      password.
    </p>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="forgotPasswordEmail"
      name="email"
      required
    />

    <div class="error-message" *ngIf="isError">{{ errorMessage }}</div>

    <button type="submit">Send Reset OTP</button>
    <a [routerLink]="'/login'">Back to Login</a>
  </form>
</app-auth-form-wrapper>
