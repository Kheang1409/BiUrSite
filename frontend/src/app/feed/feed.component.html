<div class="app-container layout-with-sides">
  <nav class="side-menu left" aria-label="Left side menu">
    <ul>
      <li *ngIf="isLoggedIn">
        <button class="menu-btn" (click)="toProfilePage()">
          <i class="fas fa-user"></i> Profile
        </button>
      </li>
      <li>
        <button class="menu-btn"><i class="fas fa-star"></i> What's New</button>
      </li>
    </ul>
  </nav>

  <div class="feed-container">
    <div *ngIf="keyword" class="search-keyword">
      Showing results for: <strong>{{ keyword }}</strong>
    </div>

    <div class="feed-posts">
      <app-post
        *ngFor="let post of posts"
        [post]="post"
        (deletePost)="deletePost(post.id)"
      ></app-post>
    </div>

    <div #infiniteAnchor class="infinite-anchor"></div>

    <div *ngIf="isLoading" class="loading-indicator message">
      <span class="spinner"></span> Loading more posts...
    </div>

    <div *ngIf="!hasMorePosts && !isError" class="no-more-posts message">
      No more posts to load.
    </div>

    <div *ngIf="isError" class="error-message message">
      {{ errorMessage }}
    </div>
  </div>

  <aside class="side-menu right" aria-label="Right side menu">
    <ul>
      <li (click)="goToPeoplePage()">
        <button class="menu-btn"><i class="fas fa-users"></i> People</button>
      </li>
    </ul>
  </aside>
</div>
