<div class="post">
  <div class="post-header">
    <img
      [src]="post.userProfile"
      class="user-avatar"
      width="40"
      height="40"
      loading="lazy"
    />
    <div class="user-info">
      <h3>{{ post.username }}</h3>
      <p>{{ post.createdDate | timeAgo }}</p>
    </div>

    <div class="post-menu" [class.active]="isMenuOpen">
      <button class="menu-button" (click)="toggleMenu($event)">
        <i class="fas fa-ellipsis-v"></i>
      </button>
      <div class="dropdown-menu">
        <ul>
          <li *ngIf="isOwner" (click)="editPost($event)">Edit</li>
          <li *ngIf="isOwner" (click)="deletePost($event)">Delete</li>
          <li *ngIf="!isOwner" (click)="reportPost($event)">Report</li>
        </ul>
      </div>
    </div>
  </div>

  <div class="post-content">
    <p>{{ post.text }}</p>
    <div *ngIf="post.imageUrl" class="post-image">
      <img
        [src]="post.imageUrl"
        alt="post image"
        loading="lazy"
        (load)="onImageLoad($event)"
        (click)="openImage($event, post.imageUrl)"
        [class.portrait]="imageClass === 'portrait'"
        [class.landscape]="imageClass === 'landscape'"
      />
    </div>
  </div>
</div>
